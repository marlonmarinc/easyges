version: '3.8'

services:
  app:
    build: .
    container_name: easyges_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=easyges
      - DB_PASS=easyges123
      - DB_NAME=easyges

  db:
    image: mysql:8.0
    container_name: easyges_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: easyges
      MYSQL_USER: easyges
      MYSQL_PASSWORD: easyges123
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: easyges_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: easyges
      PMA_PASSWORD: easyges123
    depends_on:
      - db

volumes:
  db_data:
